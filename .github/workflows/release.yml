name: Release

# Builds a signed release APK and publishes a GitHub Release whenever a
# version tag is pushed, e.g.:
#
#   git tag v1.2.0 && git push origin v1.2.0
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   KEYSTORE_BASE64   - base64 of the release keystore (.jks)
#   KEYSTORE_PASSWORD - keystore (store) password
#   KEY_ALIAS         - key alias inside the keystore
#   KEY_PASSWORD      - key password for that alias
on:
  push:
    tags:
      - 'v*'

# Allow the job to create a GitHub Release and upload assets.
permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Derive version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "version_name=${TAG#v}" >> "$GITHUB_OUTPUT"
          # Monotonic versionCode so each release outranks the last.
          echo "version_code=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is not set. See .github/workflows/release.yml header." >&2
            exit 1
          fi
          mkdir -p keystore
          echo "$KEYSTORE_BASE64" | base64 --decode > keystore/tempo-release.jks

      - name: Build signed release APK
        env:
          TEMPO_RELEASE_STORE_FILE: keystore/tempo-release.jks
          TEMPO_RELEASE_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          TEMPO_RELEASE_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          TEMPO_RELEASE_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          TEMPO_VERSION_NAME: ${{ steps.version.outputs.version_name }}
          TEMPO_VERSION_CODE: ${{ steps.version.outputs.version_code }}
        run: ./gradlew --no-daemon :app:assembleRelease

      - name: Stage APK with version in name
        run: |
          SRC=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          mkdir -p dist
          cp "$SRC" "dist/Tempo-${GITHUB_REF_NAME}.apk"
          ls -lh dist

      - name: Clean up keystore
        if: always()
        run: rm -f keystore/tempo-release.jks

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Pull this version's section from CHANGELOG.md: everything between its
          # "## [x.y.z]" header and the next "## " header.
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { capture=1; next }
            capture && /^## / { exit }
            capture { print }
          ' CHANGELOG.md | sed '/./,$!d' > release-notes.md
          if [ -s release-notes.md ]; then
            echo "Using CHANGELOG section for $VERSION as the release body."
          else
            # Version not documented yet — leave the body empty so the auto-generated
            # notes below stand in.
            echo "No CHANGELOG section for $VERSION; falling back to generated notes." >&2
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Tempo ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body_path: release-notes.md
          # Appends the "Full Changelog" compare link after the hand-written notes.
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: dist/Tempo-${{ github.ref_name }}.apk
